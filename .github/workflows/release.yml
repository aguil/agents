name: Release

on:
  push:
    tags:
      # Glob patterns (not regex). Match SemVer release tags like v0.1.0, v10.2.3, v1.0.0-alpha.1.
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Trusted publishing (OIDC): https://docs.npmjs.com/trusted-publishers
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      # npm 11.5.1+ exchanges the GitHub Actions OIDC token for a short-lived publish grant.
      # Node 22.14+ required; see npm trusted publishing docs.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run lint

      - run: bun run test:ci

      - run: bun run build

      - id: semver
        name: Derive semver from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - run: bun run scripts/prepare-npm-publish.ts -- --version "${{ steps.semver.outputs.version }}"

      - run: npm publish ./.npm-publish-pack --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/create-github-release-from-tag.sh
