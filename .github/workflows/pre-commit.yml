name: pre-commit

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      MISE_EXPERIMENTAL: "0"
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - run: mise exec --locked -- pre-commit run --show-diff-on-failure --color=always --all-files
