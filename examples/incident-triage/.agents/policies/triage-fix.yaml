id: triage-fix
description: Remediation policy for the fix role — write allowed, exec gated
capabilities:
  filesystem:
    allow: ["**"]
    # Protect secrets, the incident record, the health signal, and the
    # governance surfaces that enforce this very policy (the fix role must
    # not be able to disable its own guardrails).
    deny:
      - ".env"
      - "**/secrets/**"
      - "alert.log"
      - "check.ts"
      - ".cursor/**"
      - ".agents/**"
  exec:
    allow: ["rg", "grep", "cat", "ls", "bun run check.ts", "bun check.ts"]
    deny: ["rm", "git push", "curl", "wget"]
  network:
    deny: ["*"]
confirmations:
  requiredFor: [exec.unknown]
limits:
  timeout_ms: 300000
