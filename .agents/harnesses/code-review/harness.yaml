spec_version: "0.2"
kind: harness

harness:
  id: code-review
  description: >-
    Config-declared code-review harness (#73): expresses the
    harnesses/code-review package behavior with zero TypeScript beyond
    registered builtins. Differential parity against the package path is
    enforced by the replay corpus referee.

# Provider order mirrors runCodeReview exactly — the bundle is fingerprinted,
# so ordering is part of the parity contract.
context:
  providers:
    - use: pr-metadata
    - use: pr-referenced-docs
    - use: git-diff
    - use: agents-md

# Prompts are the package's own files (single source, no drift); paths
# resolve relative to this harness directory.
roles:
  security:
    description: Find exploitable security risks introduced by the change.
    prompt_path: ../../../harnesses/code-review/prompts/security.md
    timeout_ms: 1200000
    required_capabilities: [readOnlyMode, structuredOutput]
    enabled: tier != "trivial"
  performance:
    description: Find meaningful performance regressions introduced by the change.
    prompt_path: ../../../harnesses/code-review/prompts/performance.md
    timeout_ms: 1200000
    required_capabilities: [readOnlyMode, structuredOutput]
    enabled: tier == "full"
  quality:
    description: Find correctness and maintainability issues with clear behavioral impact.
    prompt_path: ../../../harnesses/code-review/prompts/quality.md
    timeout_ms: 1200000
    required_capabilities: [readOnlyMode, structuredOutput]
  compliance:
    description: Check project conventions, RFCs, and AGENTS.md requirements.
    prompt_path: ../../../harnesses/code-review/prompts/compliance.md
    timeout_ms: 1200000
    required_capabilities: [readOnlyMode, structuredOutput]
    enabled: tier != "trivial"

# No execution section: code-review keeps legacy finding-severity status
# semantics (parallel fan-out, findings drive status), not the generalized
# pass_check model.

output:
  schemas:
    finding: builtin:finding

filtering:
  findings:
    - builtin:actionable
deduplication:
  findings:
    - builtin:fingerprint

reporting:
  template: builtin:code-review-markdown
